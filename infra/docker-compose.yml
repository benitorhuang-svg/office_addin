services:
  nexus-center:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: nexus-center:latest
    container_name: nexus-live
    ports:
      - "4000:4000"
    environment:
      # --- AI Provider Tokens ---
      - GEMINI_API_KEY=${GEMINI_API_KEY:-""}
      - GITHUB_PAT=${GITHUB_PAT:-""}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-""}
      
      # --- Core Configuration ---
      - NODE_ENV=production
      - PORT=4000
      - AUTO_CONNECT_CLI=true
      - DEFAULT_RESPONSE_LANGUAGE=zh-TW
      
    restart: unless-stopped
    # Use healthcheck to ensure the monitor is up
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
