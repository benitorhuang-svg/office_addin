<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Center</title>
    <link rel="manifest" href="../../assets/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <!-- Office.js -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script>
      const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      if ('serviceWorker' in navigator && !isLocal) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('[Nexus] SW registered at scope:', reg.scope))
            .catch(err => console.error('[Nexus] SW registration failed:', err));
        });
      } else if (isLocal) {
        console.log('[Nexus] Localization: Service Worker bypassed in dev mode.');
      }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode nexus-bg-white nexus-text-slate-900 nexus-font-sans nexus-selection-blue">

    <!-- Nexus Core Container (Self-Stabilized) -->
    <div id="nexus-app-root" class="nexus-fixed nexus-inset-0 nexus-bg-white nexus-text-slate-900 nexus-font-outfit nexus-overflow-hidden nexus-z-50 nexus-flex nexus-flex-col" style="display: flex !important; opacity: 1 !important;">
        <!-- Initial High-Fidelity Loading State -->
        <div id="loading-screen" class="nexus-absolute nexus-inset-0 nexus-z-100 nexus-bg-white nexus-flex nexus-flex-col nexus-items-center nexus-justify-center nexus-transition-opacity nexus-duration-700 nexus-pointer-events-none">
            <div class="nexus-relative nexus-w-24 nexus-h-24 nexus-mb-6">
                <div class="nexus-absolute nexus-inset-0 nexus-bg-blue-600 nexus-opacity-20 nexus-blur-3xl nexus-rounded-full nexus-animate-pulse-glow"></div>
                <div class="nexus-relative nexus-w-full nexus-h-full nexus-border-b-2 nexus-border-blue-600 nexus-opacity-30 nexus-rounded-full nexus-animate-spin nexus-duration-1000"></div>
                <div class="nexus-absolute nexus-inset-4 nexus-bg-white nexus-rounded-full nexus-flex nexus-items-center nexus-justify-center nexus-shadow-sm">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="nexus-text-blue-600">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                </div>
            </div>
            <div class="nexus-flex nexus-flex-col nexus-items-center nexus-gap-1 nexus-animate-pulse nexus-opacity-50">
                <span class="nexus-text-tiny nexus-font-black nexus-uppercase nexus-tracking-wide-5 nexus-text-slate-400">Syncing Matrix</span>
            </div>
        </div>
    </div>

</body>
</html>
