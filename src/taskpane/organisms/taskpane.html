<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>office_Agent AI Assistant</title>
    <!-- Office.js -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-blue-100">

    <!-- Global Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-white">
        <div class="text-center">
            <div class="relative w-24 h-24 mx-auto mb-6">
                <div class="absolute inset-0 border-4 border-blue-50/50 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
            </div>
            <h2 class="text-2xl font-bold font-outfit text-slate-800 mb-2">office_Agent</h2>
            <p class="text-slate-500 animate-pulse">Initializing Workspace...</p>
        </div>
    </div>

    <!-- Onboarding Layer (Sibling of app-body so it can be shown/hidden independently) -->
    <div id="onboarding-root" class="fixed inset-0 z-40 overflow-y-auto bg-slate-50 transition-all duration-700" style="display:none;"></div>

    <main id="app-body" class="flex flex-col h-screen overflow-hidden opacity-0 transition-opacity duration-700" style="display:none;">
        <div id="header-root" class="shrink-0"></div>
        
        <section class="flex-1 flex flex-col overflow-hidden relative">
            <div id="history-root" class="flex-1 flex flex-col overflow-hidden"></div>
            <div id="prompt-root" class="shrink-0"></div>
        </section>

        <!-- Hidden container for API response text -->
        <div id="response" class="hidden"></div>
    </main>

</body>
</html>
